<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hueso: #f5f0e8;
      --hueso-oscuro: #ede6d8;
      --texto: #1c1c1c;
      --texto-muted: #7a7268;
      --borde: #ddd6c8;
      --blanco: #ffffff;
      --pueblo-primario: #3d4f5c;
      --pueblo-claro: #8fa3b0;
      --pueblo-acento: #6b8fa3;
      --pueblo-acento-claro: #c8dce8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--hueso);
      color: var(--texto);
      min-height: 100vh;
      max-width: 420px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ════════════════════════════
       SPLASH SCREEN
    ════════════════════════════ */
    #splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--pueblo-primario);
      padding: 48px 32px;
      transition: background 0.5s;
    }

    .splash-titulo {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }

    .splash-sub {
      font-size: 14px;
      color: var(--pueblo-claro);
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 64px;
      transition: color 0.5s;
    }

    .splash-instruccion {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: 48px;
      letter-spacing: 0.04em;
    }

    .lenguas-grid {
      display: flex;
      flex-direction: row;
      gap: 32px;
      justify-content: center;
    }

    .lengua-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.2s;
      background: none;
      border: none;
      padding: 0;
    }

    .lengua-btn:active { transform: scale(0.95); }

    .lengua-circulo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s;
    }

    .lengua-btn:active .lengua-circulo { border-color: rgba(255,255,255,0.6); }

    .lengua-info .nombre {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      text-align: center;
    }

    .lengua-info .detalle {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: 2px;
    }

    /* ════════════════════════════
       DICCIONARIO
    ════════════════════════════ */
    #diccionario {
      display: none;
      min-height: 100vh;
    }

    .header {
      background: var(--pueblo-primario);
      padding: 48px 24px 28px;
      position: relative;
      overflow: hidden;
      transition: background 0.4s;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn-volver {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-volver:active { background: rgba(255,255,255,0.22); }

    .header-titulo {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .header-sub {
      font-size: 12px;
      color: var(--pueblo-claro);
      transition: color 0.4s;
    }

    .pueblo-banner {
      margin: 14px 16px;
      background: var(--pueblo-primario);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.4s;
    }

    .pueblo-banner .emoji { font-size: 28px; }
    .pueblo-banner .titulo { color: #fff; font-size: 15px; font-weight: 600; }
    .pueblo-banner .desc { color: var(--pueblo-claro); font-size: 11px; margin-top: 2px; line-height: 1.4; transition: color 0.4s; }

    .search-wrap { padding: 0 16px 12px; }

    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 12px;
      padding: 10px 14px;
    }

    .search-box input {
      border: none; outline: none;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: transparent;
      color: var(--texto);
      width: 100%;
    }
    .search-box input::placeholder { color: var(--texto-muted); }

    .categorias {
      display: flex; gap: 8px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categorias::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--borde);
      background: var(--blanco);
      color: var(--texto-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-btn.activo {
      background: var(--pueblo-primario);
      color: #fff;
      border-color: var(--pueblo-primario);
    }

    .palabras {
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .palabra-card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 14px;
      overflow: hidden;
    }

    .palabra-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .palabra-header .izq { display: flex; flex-direction: column; gap: 2px; }
    .palabra-header .esp { font-size: 15px; font-weight: 500; color: var(--texto); }
    .palabra-header .cat-tag { font-size: 11px; color: var(--pueblo-acento); font-weight: 500; transition: color 0.4s; }

    .flecha { font-size: 18px; color: var(--texto-muted); transition: transform 0.2s; line-height: 1; }
    .palabra-card.abierta .flecha { transform: rotate(180deg); }

    .palabra-body {
      display: none;
      border-top: 1px solid var(--borde);
      padding: 14px 16px;
      background: var(--hueso-oscuro);
    }
    .palabra-card.abierta .palabra-body { display: block; }

    .traduccion {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--pueblo-primario);
      transition: color 0.4s;
    }
  </style>
</head>

  let puebloActivo = 'selknam';
  let catActiva = 'todas';
  let textoBusqueda = '';

  function aplicarPaleta(pueblo) {
    const p = paletas[pueblo];
    const r = document.documentElement.style;
    r.setProperty('--pueblo-primario', p.primario);
    r.setProperty('--pueblo-claro', p.claro);
    r.setProperty('--pueblo-acento', p.acento);
    r.setProperty('--pueblo-acento-claro', p.acentoClaro);
  }

  function entrarDiccionario(pueblo) {
    puebloActivo = pueblo;
    catActiva = 'todas';
    textoBusqueda = '';
    aplicarPaleta(pueblo);
    const d = datos[pueblo];
    document.getElementById('banner-emoji').textContent = d.emoji;
    document.getElementById('banner-titulo').textContent = d.titulo;
    document.getElementById('banner-desc').textContent = d.desc;
    document.getElementById('buscador').value = '';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('activo'));
    document.querySelectorAll('.cat-btn')[0].classList.add('activo');
    document.getElementById('splash').style.display = 'none';
    document.getElementById('diccionario').style.display = 'block';
    renderPalabras();
    window.scrollTo(0, 0);
  }

  function volverSplash() {
    document.getElementById('diccionario').style.display = 'none';
    document.getElementById('splash').style.display = 'flex';
    window.scrollTo(0, 0);
  }

  function renderPalabras() {
    const lista = document.getElementById('lista-palabras');
    const palabras = datos[puebloActivo].palabras.filter(p => {
      const matchCat = catActiva === 'todas' || p.cat === catActiva;
      const matchBusq = p.esp.toLowerCase().includes(textoBusqueda) || p.traduccion.toLowerCase().includes(textoBusqueda);
      return matchCat && matchBusq;
    });

    if (palabras.length === 0) {
      lista.innerHTML = '<p style="text-align:center;color:var(--texto-muted);font-size:14px;padding:32px 0;">No se encontraron palabras.</p>';
      return;
    }

    lista.innerHTML = palabras.map((p, i) => `
      <div class="palabra-card" id="card-${i}">
        <div class="palabra-header" onclick="toggleCard(${i})">
          <div class="izq">
            <span class="esp">${p.esp}</span>
            <span class="cat-tag">${p.cat.charAt(0).toUpperCase() + p.cat.slice(1)}</span>
          </div>
          <span class="flecha">⌄</span>
        </div>
        <div class="palabra-body">
          <span class="traduccion">${p.traduccion}</span>
        </div>
      </div>
    `).join('');
  }

  function toggleCard(i) {
    const card = document.getElementById('card-' + i);
    const yaAbierta = card.classList.contains('abierta');
    document.querySelectorAll('.palabra-card').forEach(c => c.classList.remove('abierta'));
    if (!yaAbierta) card.classList.add('abierta');
  }

  function filtrarCat(el, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('activo'));
    el.classList.add('activo');
    catActiva = cat;
    renderPalabras();
  }

  function filtrar() {
    textoBusqueda = document.getElementById('buscador').value.toLowerCase();
    renderPalabras();
  }
</script>
